<style>
  :root{

  /* ---------- Masthead ---------- */

  nav button{
    background:none; border:none; padding:12px 16px; font-size:13px;

  }

  .nav-spacer{flex:1;}

  main{ max-width:1100px; margin:0 auto; padding:28px 20px 80px; min-height:50vh; }

  /* ---------- Home / front page ---------- */
  .front-grid{ display:grid; grid-template-columns:1.6fr 1fr; gap:36px; }
  @media (max-width:760px){ .front-grid{grid-template-columns:1fr;} }

  .kicker{
    font-family:'IBM Plex Mono', monospace; font-size:11px; letter-spacing:.1em;
    text-transform:uppercase; color:var(--crimson); font-weight:600; margin-bottom:6px; display:block;
  }

  .lead-dek{ font-size:18px; color:var(--ink-soft); font-style:italic; margin-bottom:10px; }

  .lead-image{ width:100%; aspect-ratio:16/9; object-fit:cover; margin:16px 0; border:1px solid var(--rule); background:var(--paper-dark); }
  .lead-body{ font-size:16.5px; column-gap:28px; }

  .rail{ border-left:1px solid var(--rule); padding-left:28px; }
  .rail h3.rail-title{

    letter-spacing:.1em; border-bottom:2px solid var(--ink); padding-bottom:8px; margin-bottom:16px;
  }
  .rail-item{ padding:14px 0; border-bottom:1px solid var(--rule-faint); cursor:pointer; }
  .rail-item:last-child{border-bottom:none;}
  .rail-item h4{ font-size:17px; line-height:1.25; }
  .rail-item h4:hover{ color:var(--crimson); }
  .rail-item .byline{ margin-top:6px; }

  .story-card{ cursor:pointer; }

  /* ---------- News grid / archive ---------- */

  .article-image{ width:100%; max-width:760px; margin:22px auto; display:block; aspect-ratio:16/9; object-fit:cover; border:1px solid var(--rule); background:var(--paper-dark); }
  .article-body{ max-width:760px; margin:0 auto; font-size:18px; }
  .article-body p{ margin:0 0 18px; }

  @media (max-width:480px){ .staff-grid{grid-template-columns:1fr;} }

  .staff-name{ font-size:18px; margin-bottom:2px; }
  .staff-role{ font-family:'IBM Plex Mono',monospace; font-size:11px; color:var(--crimson); text-transform:uppercase; letter-spacing:.06em; margin-bottom:8px; }
  .staff-bio{ font-size:14.5px; color:var(--ink-soft); }
  .section-groups{ margin-top:10px; }
  .group-title{ font-family:'IBM Plex Mono',monospace; font-size:12px; text-transform:uppercase; letter-spacing:.1em; border-bottom:2px solid var(--ink); padding-bottom:8px; margin:34px 0 4px; }

  /* ---------- Contact ---------- */
  .contact-box{ max-width:500px; border:1px solid var(--rule); padding:26px; background:var(--white); }
  .contact-box div{ margin-bottom:14px; font-size:15.5px; }
  .contact-box .label{ font-family:'IBM Plex Mono',monospace; font-size:11px; text-transform:uppercase; color:var(--ink-soft); letter-spacing:.06em; display:block; margin-bottom:2px; }

  /* ---------- Buttons / forms ---------- */
  .btn{ display:inline-block; border:1px solid var(--ink); background:var(--ink); color:var(--paper); padding:9px 18px; font-family:'IBM Plex Mono',monospace; font-size:12px; text-transform:uppercase; letter-spacing:.06em; }
  .btn:hover{ background:var(--crimson); border-color:var(--crimson); }
  .btn.secondary{ background:none; color:var(--ink); }
  .btn.secondary:hover{ background:var(--ink); color:var(--paper); }
  .btn.danger{ background:none; border-color:var(--crimson); color:var(--crimson); }
  .btn.danger:hover{ background:var(--crimson); color:var(--white); }
  .btn.small{ padding:5px 12px; font-size:11px; }
  .field{ margin-bottom:16px; }
  .field label{ display:block; font-family:'IBM Plex Mono',monospace; font-size:11px; text-transform:uppercase; letter-spacing:.06em; color:var(--ink-soft); margin-bottom:5px; }
  .field input, .field textarea, .field select{
    width:100%; padding:9px 10px; border:1px solid var(--rule); background:var(--white); font-size:15px; color:var(--ink);
  }
  .field textarea{ resize:vertical; min-height:110px; }
  .field-row{ display:flex; gap:14px; }
  .field-row > .field{ flex:1; }
  .hint{ font-size:12.5px; color:var(--ink-soft); margin-top:4px; }

  /* ---------- Modal ---------- */
  .overlay{ position:fixed; inset:0; background:rgba(26,24,21,.55); display:flex; align-items:center; justify-content:center; padding:20px; z-index:50; }

  .modal h2{ font-size:24px; margin-bottom:4px; }

  .toast{ position:fixed; bottom:20px; left:50%; transform:translateX(-50%); background:var(--ink); color:var(--paper); padding:11px 22px; font-family:'IBM Plex Mono',monospace; font-size:12.5px; letter-spacing:.03em; z-index:80; box-shadow:0 6px 18px rgba(0,0,0,.25); }

  /* ---------- Admin ---------- */
  .admin-bar{ background:var(--ink); color:var(--paper); }
  .admin-bar-inner{ max-width:1100px; margin:0 auto; padding:8px 20px; display:flex; align-items:center; gap:14px; font-family:'IBM Plex Mono',monospace; font-size:11.5px; }
  .admin-bar-inner .role-badge{ background:var(--crimson); padding:2px 8px; text-transform:uppercase; letter-spacing:.05em; font-size:10px; }
  .admin-bar-inner .spacer{flex:1;}
  .admin-bar-inner button{ background:none; border:1px solid var(--paper); color:var(--paper); padding:4px 12px; font-family:inherit; font-size:11px; text-transform:uppercase; }
  .admin-tabs{ display:flex; gap:4px; border-bottom:1px solid var(--rule); margin-bottom:24px; flex-wrap:wrap; }
  .admin-tabs button{ background:none; border:none; padding:10px 16px; font-family:'IBM Plex Mono',monospace; font-size:12px; text-transform:uppercase; letter-spacing:.05em; color:var(--ink-soft); border-bottom:3px solid transparent; }
  .admin-tabs button.active{ color:var(--crimson); border-bottom-color:var(--crimson); font-weight:600; }

  .admin-table td{ padding:10px 6px; border-bottom:1px solid var(--rule-faint); vertical-align:top; }
  .admin-table tr:hover td{ background:var(--paper-dark); }
  .row-actions{ display:flex; gap:8px; }
  .admin-card{ border:1px solid var(--rule); background:var(--white); padding:22px; margin-bottom:20px; max-width:640px; }

  footer{ border-top:4px double var(--rule); margin-top:60px; padding:26px 20px 40px; text-align:center; font-family:'IBM Plex Mono',monospace; font-size:11.5px; color:var(--ink-soft); }

  @media (prefers-reduced-motion: reduce){ *{transition:none !important;} }
</style>

<body>
<div id="app"></div>

<script>
(function(){

/* =========================================================
   CONSTANTS / STORAGE HELPERS
========================================================= */
const K = {
  accounts: 'accounts',
  articles: 'articles',
  staff: 'staff',
  about: 'about',
  settings: 'settings'
};

// Site content lives in Firestore under collection "beacon", one doc per key,
// each doc shaped as { data: <value> }. This keeps the rest of the app's
// logic (which just calls getShared/setShared) unchanged.
async function getShared(key, fallback){
  try{
    const snap = await db.collection('beacon').doc(key).get();
    return snap.exists ? snap.data().data : fallback;
  }catch(e){ console.error('firestore get failed', key, e); return fallback; }
}
async function setShared(key, value){
  try{ await db.collection('beacon').doc(key).set({ data: value }); }
  catch(e){ console.error('firestore set failed', key, e); }
}

// Firebase Auth requires an email. Usernames are mapped to a fake
// address so people can still log in with a plain username.
function usernameToEmail(username){
  return username.trim().toLowerCase().replace(/[^a-z0-9._-]/g,'') + '@beacon.local';
}

function uid(){ return Date.now().toString(36)+Math.random().toString(36).slice(2,8); }
function esc(s){ return (s||'').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function fmtDate(iso){
  try{ return new Date(iso).toLocaleDateString('en-US',{month:'long',day:'numeric',year:'numeric'}); }
  catch(e){ return iso; }
}
function paragraphs(body){
  return (body||'').split(/\n\s*\n/).map(p=>`<p>${esc(p).replace(/\n/g,'<br>')}</p>`).join('');
}

/* =========================================================
   STATE
========================================================= */
let STATE = {
  loaded:false,
  accounts:[], articles:[], staff:[], about:null, settings:null,
  currentUser:null,        // {username, displayName, role}
  route:{ page:'home', param:null },
  adminTab:'articles',
  newsFilter:'All',
  toast:null,
  showLogin:false,
  showInstaller:false,
  loginError:'',
  editingArticle:null,     // article object being edited, or 'new'
  editingStaff:null,
  editingUser:null,
};

function render(){ App(document.getElementById('app')); }
function setState(patch){ Object.assign(STATE, patch); render(); }
function go(page, param){ setState({ route:{page, param}, editingArticle:null, editingStaff:null, editingUser:null }); window.scrollTo(0,0); }
function showToast(msg){ setState({toast:msg}); setTimeout(()=>{ STATE.toast=null; render(); }, 2600); }

/* =========================================================
   SEED DATA
========================================================= */
const DEFAULT_SETTINGS = {
  name:'The Ridgeview Beacon',
  tagline:'Student Voice of Ridgeview High School — Est. 1987',
  town:'Ridgeview',
  contactEmail:'beacon@ridgeview.k12.edu',
  contactRoom:'Room 214, Journalism Wing',
  meetingTimes:'Mondays & Thursdays, 3:15–4:30 PM'
};
const DEFAULT_ABOUT = {
  mission:`The Ridgeview Beacon is the official student-run news publication of Ridgeview High School. Founded in 1987, we report on campus life, student achievement, local issues, and the topics that matter to our school community.\n\nWe are committed to accurate, fair, and independent reporting. Our newsroom is staffed entirely by students, with an emphasis on developing real journalistic skill: interviewing, fact-checking, editing, and design.`,
  history:`The Beacon began as a mimeographed one-page bulletin handed out at lunch. Over three decades it has grown into a full publication covering sports, arts, academics, and student government, distributed both in print and online.`,
  join:`Interested students of any grade are welcome to join. No prior experience is required — just curiosity and a willingness to meet deadlines. Contact the faculty advisor or attend a newsroom meeting to get started.`
};
const SEED_ARTICLES = [
  {
    id:'seed1', title:'Student Council Passes New Club Funding Proposal',
    dek:'The measure triples the annual budget available to student-run organizations.',
    category:'News', author:'Staff Report', date:new Date(Date.now()-2*86400000).toISOString(),
    image:'', featured:true,
    body:`In a unanimous vote Tuesday, the Ridgeview Student Council approved a proposal that will triple the funding pool available to student clubs for the coming school year.\n\nThe change comes after months of lobbying from club leaders who said existing funds were insufficient to cover basic materials, travel, and event costs.\n\n"This is going to make a real difference for smaller clubs that never had much of a budget to begin with," said Council Treasurer Maya Chen. The new funding structure takes effect at the start of next semester.`
  },
  {
    id:'seed2', title:'Girls Soccer Advances to Regional Finals',
    dek:'A last-minute goal in the semifinal sends the Wolves to their first regional final in a decade.',
    category:'Sports', author:'Staff Report', date:new Date(Date.now()-5*86400000).toISOString(),
    image:'', featured:false,
    body:`The Ridgeview girls soccer team punched its ticket to the regional finals Friday night with a dramatic 2-1 win in the closing minute of the semifinal match.\n\nIt marks the program's first appearance in a regional final since 2015. The team will travel to face top-seeded Lincoln Park next week.`
  },
  {
    id:'seed3', title:'Fall Play Auditions Announced for "Our Town"',
    dek:'The drama department opens auditions to all grade levels next month.',
    category:'Arts', author:'Staff Report', date:new Date(Date.now()-8*86400000).toISOString(),
    image:'', featured:false,
    body:`The Ridgeview Drama Department announced open auditions for this fall's production of Thornton Wilder's "Our Town," set to take place in the auditorium next month.\n\nDirector Ms. Alvarez said the production will lean into a minimalist staging style true to the original 1938 script. Auditions are open to students of all grade levels, with no experience required.`
  }
];
const SEED_STAFF = [
  { id:'s1', name:'Jordan Lee', role:'Editor-in-Chief', grade:'Senior', bio:'Jordan oversees editorial direction and final review for every issue.', photo:'' },
  { id:'s2', name:'Amara Osei', role:'News Editor', grade:'Junior', bio:'Amara covers campus policy and student government.', photo:'' },
  { id:'s3', name:'Diego Ramirez', role:'Sports Editor', grade:'Senior', bio:'Diego leads coverage of all Ridgeview athletics.', photo:'' },
  { id:'s4', name:'Priya Nair', role:'Arts & Culture Editor', grade:'Sophomore', bio:'Priya writes about drama, music, and student art.', photo:'' },
  { id:'s5', name:'Ms. Elena Alvarez', role:'Faculty Advisor', grade:'Staff', bio:'Ms. Alvarez has advised the Beacon since 2016 and teaches AP Journalism.', photo:'' }
];

/* =========================================================
   BOOTSTRAP
========================================================= */
async function boot(){
  const [accounts, articles, staff, about, settings] = await Promise.all([
    getShared(K.accounts, null),
    getShared(K.articles, null),
    getShared(K.staff, null),
    getShared(K.about, null),
    getShared(K.settings, null),
  ]);

  STATE.articles = articles || SEED_ARTICLES;
  if(!articles) setShared(K.articles, STATE.articles);

  STATE.staff = staff || SEED_STAFF;
  if(!staff) setShared(K.staff, STATE.staff);

  STATE.about = about || DEFAULT_ABOUT;
  if(!about) setShared(K.about, STATE.about);

  STATE.settings = settings || DEFAULT_SETTINGS;
  if(!settings) setShared(K.settings, STATE.settings);

  STATE.accounts = accounts || [];
  STATE.loaded = true;
  STATE.showInstaller = STATE.accounts.length === 0;

  // Firebase keeps people signed in across visits. When auth state
  // resolves, match the signed-in Firebase user to their role record.
  auth.onAuthStateChanged(fbUser=>{
    if(fbUser){
      const acct = STATE.accounts.find(a=>a.id===fbUser.uid);
      if(acct) STATE.currentUser = {username:acct.username, displayName:acct.displayName, role:acct.role};
    } else {
      STATE.currentUser = null;
    }
    render();
  });

  render();
}

/* =========================================================
   AUTH
========================================================= */
// NOTE ON A REAL FIREBASE LIMITATION:
// Creating a new account from the client SDK automatically signs the
// browser into that brand-new account (this is how Firebase's client
// SDK works without a server). So after an admin adds a new staff
// member, the admin will be signed out and should sign back in.
// A production setup would use a Cloud Function to avoid this, which
// is outside what a static HTML file can do on its own.
async function createAccount({username, password, displayName, role}){
  const email = usernameToEmail(username);
  const cred = await auth.createUserWithEmailAndPassword(email, password);
  const acct = { id:cred.user.uid, username:username.trim().toLowerCase(), displayName:displayName.trim(), role };
  const next = [...STATE.accounts, acct];
  STATE.accounts = next;
  await setShared(K.accounts, next);
  return acct;
}

async function handleInstallerSubmit(e){
  e.preventDefault();
  const f = e.target;
  const username = f.username.value.trim();
  const displayName = f.displayName.value.trim();
  const password = f.password.value;
  if(!username || !displayName || password.length < 6){
    setState({ loginError:'Please fill every field. Password must be at least 6 characters.' });
    return;
  }
  try{
    const acct = await createAccount({username, password, displayName, role:'admin'});
    setState({ showInstaller:false, currentUser:{username:acct.username, displayName:acct.displayName, role:acct.role}, loginError:'' });
    showToast('Admin account created. Welcome, '+acct.displayName+'.');
  }catch(err){ setState({ loginError: err.message }); }
}

async function handleLoginSubmit(e){
  e.preventDefault();
  const f = e.target;
  const username = f.username.value.trim();
  const password = f.password.value;
  try{
    const cred = await auth.signInWithEmailAndPassword(usernameToEmail(username), password);
    const acct = STATE.accounts.find(a=>a.id===cred.user.uid);
    if(!acct){ setState({loginError:"Signed in, but no role is on file for this account. Ask an admin to add you."}); return; }
    setState({ showLogin:false, currentUser:{username:acct.username, displayName:acct.displayName, role:acct.role}, loginError:'' });
    showToast('Signed in as '+acct.displayName);
  }catch(err){ setState({loginError:'Incorrect username or password.'}); }
}

function logout(){
  auth.signOut();
  setState({ currentUser:null });
  go('home');
  showToast('Signed out.');
}

/* =========================================================
   CONTENT MUTATIONS
========================================================= */
async function saveArticle(data){
  let next;
  if(data.id){
    next = STATE.articles.map(a=> a.id===data.id ? {...a, ...data} : a);
  } else {
    next = [{...data, id:uid(), date:data.date||new Date().toISOString()}, ...STATE.articles];
  }
  STATE.articles = next;
  await setShared(K.articles, next);
}
async function deleteArticle(id){
  STATE.articles = STATE.articles.filter(a=>a.id!==id);
  await setShared(K.articles, STATE.articles);
}
async function saveStaffMember(data){
  let next;
  if(data.id){ next = STATE.staff.map(s=> s.id===data.id ? {...s, ...data} : s); }
  else{ next = [...STATE.staff, {...data, id:uid()}]; }
  STATE.staff = next;
  await setShared(K.staff, next);
}
async function deleteStaffMember(id){
  STATE.staff = STATE.staff.filter(s=>s.id!==id);
  await setShared(K.staff, STATE.staff);
}
async function saveAbout(data){ STATE.about = data; await setShared(K.about, data); }
async function saveSettings(data){ STATE.settings = data; await setShared(K.settings, data); }
// This revokes the person's role/access inside the site. It does not
// delete their underlying Firebase login, which would need a Cloud
// Function or the Firebase console — a static HTML file can only ever
// manage its own signed-in account, not other people's accounts.
async function deleteUser(id){
  if(STATE.accounts.length<=1){ showToast("Can't remove the only account."); return; }
  STATE.accounts = STATE.accounts.filter(a=>a.id!==id);
  await setShared(K.accounts, STATE.accounts);
}

/* =========================================================
   ROOT RENDER
========================================================= */
function App(root){
  if(!STATE.loaded){
    root.innerHTML = `<div class="loading-note">Loading the newsroom…</div>`;
    return;
  }
  let page = '';
  switch(STATE.route.page){
    case 'home': page = PageHome(); break;
    case 'news': page = PageNews(); break;
    case 'article': page = PageArticle(STATE.route.param); break;
    case 'about': page = PageAbout(); break;
    case 'staff': page = PageStaff(); break;
    case 'contact': page = PageContact(); break;
    case 'admin': page = PageAdmin(); break;
    default: page = PageHome();
  }
  root.innerHTML = `
    ${AdminBar()}
    ${Masthead()}
    ${Nav()}
    <main>${page}</main>
    ${Footer()}
    ${STATE.showInstaller ? InstallerModal() : ''}
    ${(STATE.showLogin && !STATE.showInstaller) ? LoginModal() : ''}
    ${Toast()}
  `;
  bindEvents(root);
}

/* =========================================================
   EVENT BINDING
========================================================= */
function bindEvents(root){
  root.querySelectorAll('[data-nav]').forEach(el=>{
    el.addEventListener('click', e=>{
      e.preventDefault();
      go(el.getAttribute('data-nav'), el.getAttribute('data-param'));
    });
  });
  root.querySelectorAll('[data-action]').forEach(el=>{
    el.addEventListener('click', e=>{
      const action = el.getAttribute('data-action');
      const param = el.getAttribute('data-param');
      if(action==='none' && e.target!==el) return;
      if(action==='none'){ return; } // click on overlay backdrop itself, ignore (installer non-dismissable)
      e.stopPropagation();
      handleAction(action, param, e);
    });
  });
  const modalInner = root.querySelector('.modal');
  if(modalInner) modalInner.addEventListener('click', e=>e.stopPropagation());

  root.querySelectorAll('form[data-form]').forEach(f=>{
    f.addEventListener('submit', e=>{
      const kind = f.getAttribute('data-form');
      if(kind==='installer') handleInstallerSubmit(e);
      else if(kind==='login') handleLoginSubmit(e);
      else if(kind==='article') handleArticleSubmit(e);
      else if(kind==='staff') handleStaffSubmit(e);
      else if(kind==='about') handleAboutSubmit(e);
      else if(kind==='settings') handleSettingsSubmit(e);
      else if(kind==='user') handleUserSubmit(e);
    });
  });
}

function handleAction(action, param, e){
  if(action==='open-login'){ setState({showLogin:true, loginError:''}); }
  else if(action==='close-login'){ setState({showLogin:false, loginError:''}); }
  else if(action==='logout'){ logout(); }
  else if(action==='filter'){ setState({newsFilter:param}); }
  else if(action==='admin-tab'){ setState({adminTab:param, editingArticle:null, editingStaff:null, editingUser:null}); }
  else if(action==='new-article'){ setState({editingArticle:'new'}); }
  else if(action==='edit-article'){ setState({editingArticle: STATE.articles.find(a=>a.id===param)}); }
  else if(action==='cancel-edit-article'){ setState({editingArticle:null}); }
  else if(action==='delete-article'){ if(confirm('Delete this story? This cannot be undone.')){ deleteArticle(param).then(()=>{ setState({}); showToast('Story deleted.'); }); } }
  else if(action==='new-staff'){ setState({editingStaff:'new'}); }
  else if(action==='edit-staff'){ setState({editingStaff: STATE.staff.find(s=>s.id===param)}); }
  else if(action==='cancel-edit-staff'){ setState({editingStaff:null}); }
  else if(action==='delete-staff'){ if(confirm('Remove this staff member?')){ deleteStaffMember(param).then(()=>{ setState({}); showToast('Removed.'); }); } }
  else if(action==='new-user'){ setState({editingUser:'new'}); }
  else if(action==='cancel-edit-user'){ setState({editingUser:null}); }
  else if(action==='delete-user'){ if(confirm('Remove this account?')){ deleteUser(param).then(()=>{ setState({}); showToast('Account removed.'); }); } }
}

function handleArticleSubmit(e){
  e.preventDefault();
  const f = e.target;
  const data = {
    id: f.id.value || undefined,
    title: f.title.value.trim(),
    dek: f.dek.value.trim(),
    category: f.category.value,
    author: f.author.value.trim() || STATE.currentUser.displayName,
    body: f.body.value.trim(),
    image: f.image.value.trim(),
    featured: f.featured.checked,
  };
  if(!data.id) delete data.id;
  saveArticle(data).then(()=>{ setState({editingArticle:null}); showToast('Story saved.'); });
}
function handleStaffSubmit(e){
  e.preventDefault();
  const f = e.target;
  const data = { id:f.id.value||undefined, name:f.name.value.trim(), role:f.role.value.trim(), grade:f.grade.value.trim(), bio:f.bio.value.trim(), photo:f.photo.value.trim() };
  if(!data.id) delete data.id;
  saveStaffMember(data).then(()=>{ setState({editingStaff:null}); showToast('Saved.'); });
}
function handleAboutSubmit(e){
  e.preventDefault();
  const f = e.target;
  saveAbout({ mission:f.mission.value.trim(), history:f.history.value.trim(), join:f.join.value.trim() })
    .then(()=>{ showToast('About page updated.'); render(); });
}
function handleSettingsSubmit(e){
  e.preventDefault();
  const f = e.target;
  saveSettings({
    name:f.name.value.trim(), tagline:f.tagline.value.trim(), town:f.town.value.trim(),
    contactEmail:f.contactEmail.value.trim(), contactRoom:f.contactRoom.value.trim(), meetingTimes:f.meetingTimes.value.trim()
  }).then(()=>{ showToast('Settings updated.'); render(); });
}
async function handleUserSubmit(e){
  e.preventDefault();
  const f = e.target;
  const username = f.username.value.trim().toLowerCase();
  if(STATE.accounts.some(a=>a.username===username)){ alert('That username is already taken.'); return; }
  await createAccount({ username, password:f.password.value, displayName:f.displayName.value.trim(), role:f.role.value });
  setState({editingUser:null});
  showToast('Account created.');
}

boot();
})();
</script>
</body>
</html>
